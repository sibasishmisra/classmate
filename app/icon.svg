<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a" stroke="#f5f5dc" stroke-width="2"/>
  
  <!-- Book pages -->
  <rect x="30" y="45" width="40" height="30" rx="2" fill="#faf8f3"/>
  <line x1="50" y1="45" x2="50" y2="75" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Book lines (ruled paper effect) -->
  <line x1="32" y1="52" x2="48" y2="52" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="32" y1="57" x2="48" y2="57" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="32" y1="62" x2="48" y2="62" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="32" y1="67" x2="48" y2="67" stroke="#e5e7eb" stroke-width="0.5"/>
  
  <line x1="52" y1="52" x2="68" y2="52" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="52" y1="57" x2="68" y2="57" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="52" y1="62" x2="68" y2="62" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="52" y1="67" x2="68" y2="67" stroke="#e5e7eb" stroke-width="0.5"/>
  
  <!-- Graduation cap -->
  <g transform="translate(50, 30)">
    <!-- Cap base -->
    <ellipse cx="0" cy="0" rx="12" ry="4" fill="#3b82f6"/>
    <!-- Cap top -->
    <polygon points="-15,-8 15,-8 12,-12 -12,-12" fill="#3b82f6"/>
    <!-- Tassel -->
    <line x1="12" y1="-10" x2="16" y2="-6" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="16" cy="-5" r="1.5" fill="#f59e0b"/>
  </g>
  
  <!-- Pencil -->
  <g transform="translate(75, 65) rotate(-45)">
    <rect x="-2" y="-8" width="4" height="12" fill="#f59e0b"/>
    <polygon points="-2,4 2,4 0,8" fill="#2d3748"/>
    <rect x="-2" y="-10" width="4" height="2" fill="#dc2626"/>
  </g>
</svg>
