<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#1a1a1a"/>
  
  <!-- Book pages -->
  <rect x="25" y="45" width="50" height="35" rx="2" fill="#faf8f3"/>
  <line x1="50" y1="45" x2="50" y2="80" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Book lines (ruled paper effect) -->
  <line x1="28" y1="52" x2="47" y2="52" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="28" y1="58" x2="47" y2="58" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="28" y1="64" x2="47" y2="64" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="28" y1="70" x2="47" y2="70" stroke="#e5e7eb" stroke-width="1"/>
  
  <line x1="53" y1="52" x2="72" y2="52" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="53" y1="58" x2="72" y2="58" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="53" y1="64" x2="72" y2="64" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="53" y1="70" x2="72" y2="70" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Graduation cap -->
  <g transform="translate(50, 28)">
    <!-- Cap base -->
    <ellipse cx="0" cy="0" rx="16" ry="5" fill="#3b82f6"/>
    <!-- Cap top -->
    <polygon points="-20,-10 20,-10 16,-15 -16,-15" fill="#3b82f6"/>
    <!-- Tassel -->
    <line x1="16" y1="-12" x2="22" y2="-7" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <circle cx="22" cy="-6" r="2" fill="#f59e0b"/>
  </g>
  
  <!-- Pencil -->
  <g transform="translate(80, 70) rotate(-45)">
    <rect x="-3" y="-10" width="6" height="15" fill="#f59e0b"/>
    <polygon points="-3,5 3,5 0,10" fill="#2d3748"/>
    <rect x="-3" y="-12" width="6" height="2" fill="#dc2626"/>
  </g>
</svg>
